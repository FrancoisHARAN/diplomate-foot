name: Update football data

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: football-data-pages
  cancel-in-progress: true

jobs:
  update-football-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch football data
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          WORLD_CUP_2026_COMPETITION_ID: ${{ vars.WORLD_CUP_2026_COMPETITION_ID }}
          WORLD_CUP_2026_SEASON: ${{ vars.WORLD_CUP_2026_SEASON }}
          WORLD_CUP_2026_DATE_FROM: ${{ vars.WORLD_CUP_2026_DATE_FROM }}
          WORLD_CUP_2026_DATE_TO: ${{ vars.WORLD_CUP_2026_DATE_TO }}
        run: npm run fetch:football

      - name: Commit updated data
        run: |
          if git diff --quiet -- public/live-data/matches.json; then
            echo "No football data changes."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/live-data/matches.json
            git commit -m "Update football live data"
            git push
          fi

      - name: Build site
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
